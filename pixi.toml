[workspace]
channels = ["conda-forge"]
name = "postgres_agent"
platforms = ["osx-arm64"]
version = "0.1.0"

[dependencies]
python = ">=3.11"
postgresql = ">=18"
git = "*"
make = "*"

[pypi-dependencies]
asyncpg = "*"
httpx = "*"
pytest = "*"
pytest-asyncio = "*"

[tasks]
# Database lifecycle
initdb = { cmd = "bash scripts/setup_db.sh" }
start-pg = { cmd = "bash scripts/start_pg.sh" }
stop-pg = { cmd = "bash scripts/stop_pg.sh" }
setup = { cmd = "bash scripts/setup_db.sh && bash scripts/start_pg.sh && bash scripts/install_pgmq.sh && psql -h localhost -p 5432 -U agent -d agentdb -f init.sql", depends-on = [] }
run = { cmd = "python agents.py" }
query = { cmd = "psql -h localhost -p 5432 -U agent -d agentdb -c \"SELECT agent_id, task_id, status, COALESCE(output->>'summary', output->>'executive_briefing') as result, lineage FROM agent_memory ORDER BY created_at;\"" }
reset = { cmd = "bash scripts/stop_pg.sh && rm -rf .pgdata && pixi run setup" }
test = { cmd = "python -m pytest test_agents.py -v" }
